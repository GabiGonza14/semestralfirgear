services:
  mongodb:
    image: mongo:8.0
    container_name: fitgear-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: fitgear
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitgear-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://root:rootpassword@mongodb:27017/fitgear?authSource=admin
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:4000
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Horneadas en el bundle del cliente en build-time por Vite — deben
        # apuntar a URLs alcanzables desde el NAVEGADOR del usuario, no desde
        # la red interna de Docker (por eso localhost:4000, no backend:4000).
        VITE_API_BASE_URL: http://localhost:4000/api
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST}
    container_name: fitgear-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Leidas en runtime por el middleware de Clerk en el server SSR
      # (app/start.ts) — sin prefijo VITE_, nunca se inyectan en el cliente.
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    ports:
      - "3000:3000"

volumes:
  mongodb_data:
  mongodb_config:
