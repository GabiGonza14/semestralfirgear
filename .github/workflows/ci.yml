name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Ningun job de este workflow escribe al repo, comenta PRs ni sube paquetes --
# solo hacen checkout y corren tests. El GITHUB_TOKEN por defecto trae permisos
# amplios de lectura/escritura si no se restringen explicitamente; con
# read-only alcanza para todo lo que hace este pipeline (contents: read cubre
# actions/checkout y actions/upload-artifact).
permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (typecheck + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Not `npm ci`: known npm bug (npm/cli#4828) where `ci` fails to
      # install nested optionalDependencies correctly -- @rolldown/binding-
      # linux-x64-gnu is listed in package-lock.json but `ci` skips it on
      # ubuntu-latest runners, breaking `vite build`. `install` resolves it.
      - run: npm install
      # npm run build (vite build && tsc --noEmit) -- not a bare `npm run
      # typecheck`: app/routeTree.gen.ts is gitignored and only generated by
      # the TanStack Router plugin during `vite build`. On a fresh checkout
      # (no prior local build) a standalone tsc run fails immediately with
      # "Cannot find module './routeTree.gen'" -- same bug already fixed once
      # for the Vercel/Render deploy build, see git history on render.yaml.
      - run: npm run build
      - run: npm run test -- --run

  backend:
    name: Backend (unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - run: bun install
      # Not a single `bun test`: mock.module() replacements and the shared
      # `env` singleton are process-global in Bun, not scoped per file, so
      # loading every test file into one process lets one file's mocks/env
      # mutations leak into another's. Never reproduced locally on Windows
      # (file discovery order happens to protect against it there) but reliably
      # broke notificationService.test.ts's real-implementation assertions on
      # Linux CI runners. Running each file as its own process removes the
      # shared module registry entirely -- verified 0 failures this way.
      - name: bun test (un proceso por archivo)
        run: |
          status=0
          while IFS= read -r file; do
            echo "::group::$file"
            bun test "$file" || status=1
            echo "::endgroup::"
          done < <(find src/__tests__ -name '*.test.ts' | sort)
          exit $status

  mcp-server:
    name: MCP server (unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - run: bun install
      # mcp-server reutiliza services/models/middlewares de backend/src/ sin
      # duplicar logica (imports cross-package) -- necesita backend/node_modules
      # instalado tambien, no solo el suyo propio.
      - run: (cd ../backend && bun install)
      # Same reasoning as the backend job above -- isolate each file's mocks.
      - name: bun test (un proceso por archivo)
        run: |
          status=0
          while IFS= read -r file; do
            echo "::group::$file"
            bun test "$file" || status=1
            echo "::endgroup::"
          done < <(find src/__tests__ -name '*.test.ts' | sort)
          exit $status

  e2e-public:
    name: Playwright (e2e/public, sin credenciales)
    runs-on: ubuntu-latest
    needs: frontend
    # "Sin credenciales" es sobre la CUENTA de prueba (ningun spec de
    # e2e/public inicia sesion) -- pero @clerk/tanstack-react-start exige una
    # CLERK_SECRET_KEY presente para que el server SSR arranque, sin importar
    # si la ruta requiere auth o no. Sin esto el `npm run start` del webServer
    # crashea en cada request ("Clerk: no secret key provided") y las 34
    # specs fallan por timeout, no por su propia logica. Usa los mismos repo
    # vars/secrets que e2e-authenticated (ver docs/e2e-testing.md).
    env:
      CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Not `npm ci`: known npm bug (npm/cli#4828) where `ci` fails to
      # install nested optionalDependencies correctly -- @rolldown/binding-
      # linux-x64-gnu is listed in package-lock.json but `ci` skips it on
      # ubuntu-latest runners, breaking `vite build`. `install` resolves it.
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx playwright test e2e/public --reporter=list
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  e2e-authenticated:
    name: Playwright (e2e/authenticated, requiere secrets)
    runs-on: ubuntu-latest
    needs: frontend
    # jobs.<job_id>.if solo tiene acceso a github/needs/vars/inputs -- el
    # contexto secrets no esta permitido ahi (rompe el workflow entero al
    # parsearlo). vars.E2E_ADMIN_EMAIL alcanza como gate: si esta seteada, se
    # asume que tambien se configuraron los secrets necesarios.
    if: ${{ vars.E2E_ADMIN_EMAIL != '' }}
    env:
      E2E_CUSTOMER_EMAIL: ${{ vars.E2E_CUSTOMER_EMAIL }}
      E2E_ADMIN_EMAIL: ${{ vars.E2E_ADMIN_EMAIL }}
      CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      # /api/ready (backend/src/services/healthService.ts) exige Mongo Y
      # Stripe alcanzables -- stripe.balance.retrieve() necesita una key real,
      # no solo presente. El propio test de creacion de pedido tambien crea un
      # PaymentIntent real, asi que esta key hace falta de todas formas.
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      # Not `npm ci`: known npm bug (npm/cli#4828) where `ci` fails to
      # install nested optionalDependencies correctly -- @rolldown/binding-
      # linux-x64-gnu is listed in package-lock.json but `ci` skips it on
      # ubuntu-latest runners, breaking `vite build`. `install` resolves it.
      - run: npm install
      - run: (cd backend && bun install)
      - run: npx playwright install --with-deps chromium
      - name: Start backend and wait for readiness
        run: |
          (cd backend && bun run start &)
          timeout 30 bash -c 'until curl -sf http://localhost:4000/api/ready; do sleep 1; done'
      - run: npm run build
      - run: npx playwright test e2e/authenticated --reporter=list
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-authenticated
          path: playwright-report/
          retention-days: 7
